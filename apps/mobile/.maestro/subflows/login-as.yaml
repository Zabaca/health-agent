# Reusable subflow: sign in with email + password and clear any post-login
# gates (biometric setup, legal consent) so the caller lands in the app.
#
# Pulled in via `runFlow: ../subflows/login-as.yaml`. Expects two env vars:
#   MAESTRO_EMAIL, MAESTRO_PASSWORD
# Pass them on the CLI with `-e` (see .maestro/README.md / the e2e script).
appId: com.zabaca.veladon
---
- extendedWaitUntil:
    visible:
      id: "signin-email"
    timeout: 30000
- tapOn:
    id: "signin-email"
- inputText: ${MAESTRO_EMAIL}
- tapOn:
    id: "signin-password"
- inputText: ${MAESTRO_PASSWORD}
# hideKeyboard is unreliable here; dismiss by tapping a static label so the
# Sign In button (below the keyboard) becomes hittable.
- tapOn: "or continue with email"
# Bottom-pinned Button: tap the visible label (id-tap can no-op). "Sign In" is
# distinct from the "Sign in with Apple/Google" provider buttons.
- tapOn: "Sign In"

# iOS offers to save the password after a sign-in; dismiss it (optional → no-op
# if absent). Otherwise it overlays the next screen and blocks assertions.
- tapOn:
    text: "Not Now"
    optional: true

# --- Post-login gates (see src/navigation/RootNavigator.tsx) ---------------
# Each is handled only if it actually appears, so this subflow works for both
# brand-new accounts (consent shown) and returning ones (gates already passed).

# Biometric first-run prompt. Only appears when the device has an enrolled
# biometric; a stock iOS Simulator has none, so this is usually skipped.
- runFlow:
    when:
      visible: "Skip"
    commands:
      - tapOn: "Skip"

# Legal consent gate (fresh accounts). Email signups already have a DOB on
# file, so only the two checkboxes + Continue are shown.
- runFlow:
    when:
      visible:
        id: "consent-screen"
    commands:
      - tapOn:
          id: "consent-tos"
      - tapOn:
          id: "consent-privacy"
      - tapOn: "Continue"
